name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Sync project dependencies
        run: uv sync --extra dev --frozen

      - name: Ruff lint
        run: uv run ruff check --output-format=github .

      - name: Ruff format check
        run: uv run ruff format --check --diff .

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Sync project dependencies
        run: uv sync --extra dev --frozen

      - name: Type check
        run: uv run mypy .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync project dependencies
        run: uv sync --extra dev --frozen

      - name: Run tests with coverage
        run: uv run pytest --cov=automox_mcp --cov-fail-under=90 --cov-report=term-missing

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Sync project dependencies
        run: uv sync --extra dev --frozen

      - name: Ensure pip available in venv
        run: .venv/bin/python -m ensurepip --upgrade

      - name: Build distribution artifacts
        run: uv run python -m build

      - name: Validate distribution metadata
        run: uv run python -m twine check dist/*

      - name: Export locked requirements
        run: |
          uv export --format requirements.txt --all-extras --no-editable --no-hashes --locked \
            --output-file requirements-ci.txt

      - name: Dependency vulnerability audit
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: |
            requirements-ci.txt
          virtual-environment: .venv

  ci-pass:
    if: always()
    needs: [lint, typecheck, test, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify all jobs passed
        if: >-
          needs.lint.result != 'success' ||
          needs.typecheck.result != 'success' ||
          needs.test.result != 'success' ||
          needs.build.result != 'success'
        run: |
          echo "::error::One or more CI jobs did not succeed."
          exit 1
