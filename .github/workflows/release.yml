name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write  # Required for creating GitHub Releases
  id-token: write  # Required for trusted publishing and Sigstore signing

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.13"

      - name: Validate tag matches project version
        run: |
          python - <<'PY'
          import os, pathlib, sys, tomllib

          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          version = pyproject["project"]["version"]
          ref = os.environ.get("GITHUB_REF_NAME", "")
          # Strip 'v' prefix
          tag_version = ref.lstrip("v")
          if tag_version != version:
              raise SystemExit(f"Tag {ref!r} does not match project version {version!r}")
          PY

      - name: Install build backend
        run: python -m pip install --upgrade pip build

      - name: Build distribution
        run: python -m build

      - name: Generate SBOM
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment --output sbom.cdx.json --output-format json

      - name: Sign artifacts with Sigstore
        run: |
          pip install sigstore
          python -m sigstore sign dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          files: |
            dist/*
            dist/*.sigstore
            sbom.cdx.json
          generate_release_notes: true
