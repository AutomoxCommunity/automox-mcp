name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for creating GitHub Releases
      id-token: write  # Required for trusted publishing and Sigstore signing
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Validate tag matches project version
        run: |
          python - <<'PY'
          import os, pathlib, sys, tomllib

          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          version = pyproject["project"]["version"]
          ref = os.environ.get("GITHUB_REF_NAME", "")
          # Strip 'v' prefix
          tag_version = ref.lstrip("v")
          if tag_version != version:
              raise SystemExit(f"Tag {ref!r} does not match project version {version!r}")
          PY

      - name: Install build backend
        run: python -m pip install --upgrade pip build

      - name: Build distribution
        run: python -m build

      - name: Generate SBOM
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment -o sbom.cdx.json --of json

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

      - name: Sign artifacts with Sigstore
        run: |
          pip install sigstore
          python -m sigstore sign dist/*.whl dist/*.tar.gz

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/*.whl dist/*.tar.gz dist/*.sigstore.json sbom.cdx.json
