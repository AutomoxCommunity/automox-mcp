name: Publish to PyPI, MCP Registry, and MCPB

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write  # Required for creating GitHub Releases
      id-token: write  # Required for trusted publishing and Sigstore signing
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.13"
          enable-cache: false  # Don't trust CI caches in a release pipeline

      - name: Validate tag matches project version
        run: |
          python - <<'PY'
          import os, pathlib, sys, tomllib

          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          version = pyproject["project"]["version"]
          ref = os.environ.get("GITHUB_REF_NAME", "")
          # Strip 'v' prefix
          tag_version = ref.lstrip("v")
          if tag_version != version:
              raise SystemExit(f"Tag {ref!r} does not match project version {version!r}")
          PY

      - name: Check if version already exists on PyPI
        id: pypi_check
        run: |
          VERSION=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if curl -sf "https://pypi.org/pypi/automox-mcp/${VERSION}/json" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $VERSION already exists on PyPI — skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync project dependencies
        run: uv sync --frozen

      - name: Build distribution
        run: uv build

      - name: Generate SBOM
        run: uv run --with cyclonedx-bom cyclonedx-py environment -o sbom.cdx.json --of json

      # ---------------------------------------------------------------
      # MCPB Desktop Extension — built up front (before the PyPI publish
      # and the GitHub Release) so every asset, including the .mcpb,
      # attaches in ONE atomic `gh release create`. Immutable releases
      # snapshot the asset set at publication, so nothing can be added
      # afterward (#110). Building first also means a pack failure aborts
      # before the irreversible PyPI push.
      #
      # The bundle is a uvx-shim — real code is pulled from PyPI at install
      # time; the version is overridden from the tag so the bundle pins the
      # matching automox-mcp release.
      #
      # Node + npm are pre-installed on ubuntu-latest; we skip
      # actions/setup-node (only need `npm install -g`, and its implicit
      # cache trips zizmor's cache-poisoning audit).
      #
      # TODO(supply chain): pin @anthropic-ai/mcpb once we settle a version.
      # ---------------------------------------------------------------
      - name: Install MCPB CLI
        run: |
          node --version
          npm install -g @anthropic-ai/mcpb

      - name: Compute MCPB bundle version
        run: echo "BUNDLE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Set MCPB bundle version in manifest and pyproject
        run: |
          jq --arg v "$BUNDLE_VERSION" '.version = $v' mcpb/manifest.json > mcpb/manifest.tmp
          mv mcpb/manifest.tmp mcpb/manifest.json
          # Quoted heredoc — version is read from the env, never interpolated
          # by the shell. Prevents any shell metacharacters in the tag name
          # from being expanded inside the Python script.
          python3 <<'PY'
          import os, re, pathlib
          v = os.environ["BUNDLE_VERSION"]
          path = pathlib.Path("mcpb/pyproject.toml")
          text = path.read_text()
          text = re.sub(r'^version\s*=\s*"[^"]+"', f'version = "{v}"', text, count=1, flags=re.M)
          text = re.sub(r'"automox-mcp>=[^"]+"', f'"automox-mcp>={v}"', text, count=1)
          path.write_text(text)
          PY
          echo "MCPB bundle version set to $BUNDLE_VERSION"

      - name: Build MCPB bundle
        run: mcpb pack mcpb "mcpb/automox-mcp-${BUNDLE_VERSION}.mcpb"

      - name: Publish to PyPI
        if: steps.pypi_check.outputs.exists != 'true'
        # `skip-existing` is a defense against race conditions when two
        # workflow runs are scheduled for the same tag (we have observed
        # GitHub deliver the same `push: tags:` event twice on a multi-
        # tag push). The earlier `pypi_check` gate handles the common
        # case; this turns the loser of any race into a no-op success
        # instead of a noisy `400 File already exists` failure.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          skip-existing: true

      - name: Sign artifacts with Sigstore
        run: uvx sigstore sign dist/*.whl dist/*.tar.gz

      - name: Create GitHub Release (atomic — all assets)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Single atomic create with the COMPLETE asset set, so the release
          # is immutable-safe: immutable releases snapshot assets at publish
          # and reject any later add/clobber (#110).
          if gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1; then
            # The release already exists (a re-run). Under immutability its
            # assets can't be patched, so this is a deliberate no-op rather
            # than a (now-impossible) --clobber. Recovery from a *partial*
            # release is delete-then-recreate, done deliberately by the
            # operator: `gh release delete <tag> --yes` then re-run.
            echo "::notice::Release $GITHUB_REF_NAME already exists — leaving as-is."
          else
            gh release create "$GITHUB_REF_NAME" \
              --generate-notes \
              dist/*.whl dist/*.tar.gz dist/*.sigstore.json sbom.cdx.json \
              "mcpb/automox-mcp-${BUNDLE_VERSION}.mcpb"
          fi

      # ---------------------------------------------------------------
      # MCP Registry publish (Step 8 of publish-automox-mcp-to-registry.md)
      #
      # Skipped when PyPI publish was skipped (version already on PyPI),
      # because the registry validates the `mcp-name` marker against the
      # live PyPI listing — backfills should be done manually.
      #
      # TODO(supply chain): pin mcp-publisher to a specific release once
      # the registry GAs. Currently uses `latest` to match the upstream
      # quickstart. Tracked alongside other supply-chain items.
      # ---------------------------------------------------------------

      # The MCP Registry validates the package by querying the SAME URL
      # this step polls (https://pypi.org/pypi/<name>/<version>/json). On
      # the happy path PyPI serves it within seconds; on the unhappy path
      # this confirms PyPI itself completed the upload. The registry's
      # *server-side* lookup is handled by the retry loop on the publish
      # step below.
      - name: Wait for PyPI to serve new version
        if: steps.pypi_check.outputs.exists != 'true'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Waiting for PyPI CDN to serve automox-mcp==${VERSION}..."
          for i in $(seq 1 30); do
            if curl -sf "https://pypi.org/pypi/automox-mcp/${VERSION}/json" > /dev/null 2>&1; then
              echo "PyPI now serving ${VERSION} (after $((i * 10))s)."
              exit 0
            fi
            echo "  attempt ${i}/30: not yet, sleeping 10s..."
            sleep 10
          done
          echo "::error::PyPI did not serve ${VERSION} within 5 minutes."
          exit 1

      - name: Install mcp-publisher
        if: steps.pypi_check.outputs.exists != 'true'
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher
          ./mcp-publisher --help > /dev/null

      - name: Set version in server.json from tag
        if: steps.pypi_check.outputs.exists != 'true'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp
          mv server.tmp server.json
          echo "server.json version set to $VERSION"

      - name: Authenticate to MCP Registry
        if: steps.pypi_check.outputs.exists != 'true'
        env:
          MCP_REGISTRY_PRIVATE_KEY: ${{ secrets.MCP_REGISTRY_PRIVATE_KEY }}
        run: ./mcp-publisher login dns --domain automox.com --private-key "$MCP_REGISTRY_PRIVATE_KEY"

      # The MCP Registry validates by fetching the same PyPI JSON URL the
      # wait step above just confirmed (see
      # https://github.com/modelcontextprotocol/registry/blob/main/internal/validators/registries/pypi.go).
      # But the registry's server-side lookup hits a different PyPI CDN
      # edge than the GitHub Actions runner — observed on v1.0.29, v1.0.30,
      # and v1.0.31 (which had the wait step in place, runner saw 200,
      # registry saw 404 within 0.3 s). PoP propagation between PyPI edges
      # typically catches up within 3-5 minutes. Retry with 30 s backoff
      # so the publish lands as soon as the registry's PoP is in sync.
      - name: Publish to MCP Registry (with retry)
        if: steps.pypi_check.outputs.exists != 'true'
        run: |
          for i in $(seq 1 6); do
            if ./mcp-publisher publish; then
              echo "MCP Registry publish succeeded on attempt ${i}."
              exit 0
            fi
            if [ "$i" -lt 6 ]; then
              echo "  attempt ${i}/6 failed, sleeping 30s before retry..."
              sleep 30
            fi
          done
          echo "::error::MCP Registry publish failed after 6 attempts (~2.5 min total). Re-run via 'gh workflow run release.yml --ref ${GITHUB_REF_NAME}'."
          exit 1

      # (MCPB build moved earlier — before PyPI publish and the GitHub
      # Release create — so all assets, including the .mcpb, attach in a
      # single atomic `gh release create`. See #110.)

  # Post-publish smoke: install the just-published version straight from PyPI and
  # confirm the wheel resolves and the entry point boots. Catches a broken
  # publish (bad wheel, missing dep, broken console-script) in minutes rather
  # than via a user report. Runs after `publish`; no secrets, no approval gate.
  verify-publish:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions: {}
    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.13"
          enable-cache: false

      # Two hard-won details (v2.0.3): (1) uv caches simple-index responses,
      # so without --refresh-package every retry after a too-early first
      # attempt replays the cached "no such version" miss instead of
      # re-checking PyPI. (2) Index propagation occasionally exceeds the old
      # 2-minute window (6x20s), failing the run and costing ~20 attended
      # minutes to diagnose and rerun. Runner minutes are free; the loop
      # exits on the first success, so the generous 15-minute ceiling costs
      # nothing on a normal day.
      - name: Install published package from PyPI and boot it
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Verifying automox-mcp==${VERSION} installs from PyPI and boots..."
          for i in $(seq 1 30); do
            if uvx --refresh-package automox-mcp --from "automox-mcp==${VERSION}" automox-mcp --help > /dev/null 2>&1; then
              echo "Published package installs and the entry point boots."
              exit 0
            fi
            echo "  attempt ${i}/30: not installable yet (PyPI index propagation?), sleeping 30s..."
            sleep 30
          done
          echo "::error::Published automox-mcp==${VERSION} failed to install/boot from PyPI after ~15 minutes."
          exit 1
