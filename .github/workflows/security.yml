name: Security Scans

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"

jobs:

  trufflehog:
    name: TruffleHog Secrets Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Scan working tree for secrets
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD:/pwd" \
            trufflesecurity/trufflehog:3.94.3@sha256:8837fd74692f6da826b51bc008b6bcf0dd2d70d31d06792673872a235d9b7e39 \
            filesystem --directory=/pwd --results=verified,unknown --json --fail \
            | tee trufflehog.json

      - name: Upload TruffleHog report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trufflehog-report
          path: trufflehog.json

  mcp-scanner:
    name: MCP Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Sync project dependencies
        run: uv sync --extra dev --frozen

      - name: Run mcp-scanner against stdio server
        run: |
          set -euo pipefail
          uvx --from cisco-ai-mcp-scanner mcp-scanner \
            --analyzers yara \
            --format summary \
            stdio \
            --stdio-command uv \
            --stdio-arg run \
            --stdio-arg automox-mcp \
            --stdio-env AUTOMOX_API_KEY=test-api-key \
            --stdio-env AUTOMOX_ACCOUNT_UUID=test-account \
            --stdio-env AUTOMOX_ORG_ID=1 \
            --stdio-env AUTOMOX_MCP_SKIP_DOTENV=1 \
            | tee mcp-scanner.txt

      - name: Fail if MCP Scanner reports unsafe tools
        if: ${{ always() }}
        run: |
          if [ ! -f mcp-scanner.txt ]; then
            echo "mcp-scanner.txt not found; mcp-scanner likely failed."
            exit 1
          fi
          python3 - <<'PY'
          import pathlib, re, sys

          summary = pathlib.Path("mcp-scanner.txt").read_text()
          match = re.search(r"Unsafe (?:tools|items):\s*(\d+)", summary)
          if match is None:
              print("Unable to locate 'Unsafe tools/items' line in MCP scanner output.")
              print("Output was:")
              print(summary)
              sys.exit(1)
          unsafe_count = int(match.group(1))
          if unsafe_count > 0:
              print(summary)
              print(f"Unsafe items detected: {unsafe_count}")
              sys.exit(1)
          print("MCP Scanner reported no unsafe items.")
          PY

      - name: Upload MCP Scanner report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mcp-scanner-summary
          path: mcp-scanner.txt

  zizmor:
    name: Zizmor GitHub Actions audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Scan workflows
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          online-audits: false
          annotations: true
          advanced-security: false

  # Dependency vulnerability audit on the weekly schedule (and on demand). The
  # PR/push audit lives in the CI `build` job; this closes the quiet-period gap
  # where a CVE is disclosed against a pinned dep with no intervening commit.
  pip-audit:
    name: Dependency vulnerability audit (scheduled)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Export locked requirements
        run: |
          uv export --format requirements.txt --all-extras --no-editable --no-hashes --locked \
            --output-file requirements-ci.txt

      - name: Dependency vulnerability audit
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: |
            requirements-ci.txt
